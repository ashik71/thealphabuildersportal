<h2 mat-dialog-title>{{ isEdit ? 'Edit Shareholder' : 'New Shareholder' }}</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="form-stack">
    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Name</mat-label>
      <input matInput formControlName="Name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Phone</mat-label>
      <input matInput formControlName="Phone" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="Email" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit">{{ isEdit ? 'Save Changes' : 'Create' }}</button>
  </mat-dialog-actions>
</form>
