<app-page-header title="Shareholders" subtitle="Investors and partners across your projects">
  <button mat-flat-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    New Shareholder
  </button>
</app-page-header>

@if (loading()) {
  <div class="shareholder-list__loading">
    <mat-spinner diameter="36" />
  </div>
} @else if (shareholders().length === 0) {
  <p class="shareholder-list__empty">No shareholders yet. Add one to start tracking commitments and payments.</p>
} @else {
  <div class="shareholder-list__table-wrap">
    <table mat-table [dataSource]="shareholders()" class="shareholder-list__table">
      <ng-container matColumnDef="Name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let s">{{ s.Name }}</td>
      </ng-container>

      <ng-container matColumnDef="Phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let s">{{ s.Phone || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="Email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let s">{{ s.Email || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button (click)="openEditDialog(s)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteShareholder(s)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
}
