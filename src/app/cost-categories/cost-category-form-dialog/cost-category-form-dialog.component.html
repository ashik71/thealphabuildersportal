<h2 mat-dialog-title>{{ isEdit ? 'Edit Category' : isNewSubCategory ? 'New Sub-Category' : 'New Category' }}</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="form-stack">
    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Name</mat-label>
      <input matInput formControlName="Name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Parent Category</mat-label>
      <mat-select formControlName="ParentCategoryId">
        <mat-option value="">None (top-level)</mat-option>
        @for (c of parentOptions; track c._id) {
          <mat-option [value]="c._id">{{ c.Name }}</mat-option>
        }
      </mat-select>
      @if (lockParent) {
        <mat-hint>Has sub-categories, so it must stay top-level.</mat-hint>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="Description" rows="2"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit">{{ isEdit ? 'Save Changes' : 'Create' }}</button>
  </mat-dialog-actions>
</form>
