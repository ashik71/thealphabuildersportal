<h2 mat-dialog-title>Add Expense</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="form-stack">
    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Cost Category</mat-label>
      <mat-select formControlName="CostCategoryId" required>
        @for (c of topLevelCategories(); track c._id) {
          <mat-option [value]="c._id">{{ c.Name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Description</mat-label>
      <input matInput formControlName="Description" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Amount</mat-label>
      <input matInput type="number" formControlName="Amount" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Paid To</mat-label>
      <input matInput formControlName="PaidTo" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-stack__field">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="Notes" rows="2"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit">Save</button>
  </mat-dialog-actions>
</form>
