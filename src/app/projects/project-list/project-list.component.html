<app-page-header title="Projects" subtitle="All construction projects">
  <button mat-flat-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    New Project
  </button>
</app-page-header>

<mat-form-field appearance="outline" class="project-list__search">
  <mat-label>Search projects</mat-label>
  <input matInput [value]="searchTerm()" (input)="searchTerm.set($any($event.target).value)" />
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

@if (loading()) {
  <div class="project-list__loading">
    <mat-spinner diameter="36" />
  </div>
} @else if (filteredProjects().length === 0) {
  <p class="project-list__empty">No projects match your search.</p>
} @else {
  <div class="project-list__table-wrap">
    <table mat-table [dataSource]="filteredProjects()" class="project-list__table">
      <ng-container matColumnDef="Name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let p">{{ p.Name }}</td>
      </ng-container>

      <ng-container matColumnDef="Location">
        <th mat-header-cell *matHeaderCellDef>Location</th>
        <td mat-cell *matCellDef="let p">{{ p.Location || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="Status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let p">
          <mat-chip [class]="'status-chip status-chip--' + statusTone(p.Status)">{{ p.Status }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="EstimatedCost">
        <th mat-header-cell *matHeaderCellDef>Estimated</th>
        <td mat-cell *matCellDef="let p">{{ p.EstimatedCost | number: '1.0-0' }}</td>
      </ng-container>

      <ng-container matColumnDef="ActualCost">
        <th mat-header-cell *matHeaderCellDef>Actual</th>
        <td mat-cell *matCellDef="let p">{{ p.ActualCost | number: '1.0-0' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button (click)="generateLink(p, $event)" matTooltip="Copy view-only link">
            <mat-icon>link</mat-icon>
          </button>
          <button mat-icon-button (click)="openEditDialog(p, $event)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteProject(p, $event)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="openDetails(row._id)"></tr>
    </table>
  </div>
}
