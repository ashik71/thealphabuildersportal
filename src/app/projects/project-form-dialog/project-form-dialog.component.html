<h2 mat-dialog-title>{{ isEdit ? 'Edit Project' : 'New Project' }}</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="project-form">
    <mat-form-field appearance="outline" class="project-form__field">
      <mat-label>Project Name</mat-label>
      <input matInput formControlName="Name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="project-form__field">
      <mat-label>Location</mat-label>
      <input matInput formControlName="Location" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="project-form__field">
      <mat-label>Summary</mat-label>
      <textarea matInput formControlName="Summary" rows="2"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="project-form__field">
      <mat-label>Estimated Cost</mat-label>
      <input matInput type="number" formControlName="EstimatedCost" required />
    </mat-form-field>

    <div class="project-form__row">
      <mat-form-field appearance="outline" class="project-form__field">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" formControlName="StartDate" />
        <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="project-form__field">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endPicker" formControlName="EndDate" />
        <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="project-form__field">
      <mat-label>Status</mat-label>
      <mat-select formControlName="Status">
        @for (status of statuses; track status) {
          <mat-option [value]="status">{{ status }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit">{{ isEdit ? 'Save Changes' : 'Create Project' }}</button>
  </mat-dialog-actions>
</form>
