<mat-card class="max-w-md mx-auto p-6">
  <h2 class="text-2xl mb-4">Admin Login</h2>
  <form (ngSubmit)="onSubmit()">
    <mat-form-field class="w-full mb-4">
      <input matInput placeholder="Email" [(ngModel)]="email" name="eamil" required>
    </mat-form-field>
    <mat-form-field class="w-full mb-4">
      <input matInput placeholder="Password" [(ngModel)]="password" name="password" type="password" required>
    </mat-form-field>
    <button mat-raised-button color="primary" type="submit">Login</button>
  </form>
</mat-card>
