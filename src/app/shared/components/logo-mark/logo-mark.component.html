<svg
  class="logo-mark"
  [attr.viewBox]="inline() ? '3 80 403 432' : '3 48 403 464'"
  role="img"
  aria-label="Sukun Builders"
  [style.height.px]="size()"
  [style.width.px]="width()"
  [style.--sb-mark-gap]="gap()"
>
  <defs>
    <g id="sbTowerBody">
      <rect x="178" y="140" width="44" height="336" />
      <rect x="167" y="476" width="66" height="16" />
      <rect x="183" y="110" width="34" height="30" />
      <rect x="189" y="86" width="22" height="24" />
    </g>
    <g id="sbTower">
      <use href="#sbTowerBody" />
      <rect x="196" y="54" width="8" height="32" />
    </g>
  </defs>

  <g
    fill="currentColor"
    font-family="Poppins, 'Segoe UI', Arial, sans-serif"
    font-weight="700"
    font-size="310"
    text-anchor="middle"
  >
    <text x="112" y="440">S</text>
    <text x="288" y="440">B</text>
  </g>

  <!-- Wide background-coloured stroke carves the gap where the tower crosses
       the letterforms; the solid fill is drawn over it. Inline drops the thin
       antenna, which at header sizes renders as a stray sub-pixel stub. -->
  <use
    [attr.href]="inline() ? '#sbTowerBody' : '#sbTower'"
    fill="none"
    stroke="var(--sb-mark-gap, transparent)"
    stroke-width="12"
    stroke-linejoin="round"
  />
  <use [attr.href]="inline() ? '#sbTowerBody' : '#sbTower'" fill="currentColor" />
</svg>
